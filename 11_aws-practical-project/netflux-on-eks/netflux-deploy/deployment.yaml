# Kubernetes Deployment 정의 파일
# 역할: EKS 클러스터에서 netflux Flask 애플리케이션 파드를 실행하도록 지시하는 설정 파일
# 주의: image 주소는 CI/CD 파이프라인(buildspec.yml)이 자동으로 최신 버전으로 교체합니다

apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflux           # 이 Deployment의 이름
  namespace: netflux      # 배포될 Kubernetes 네임스페이스 (netflux 앱 전용 공간)
  labels:
    app: netflux          # 라벨: 서비스와 파드를 연결할 때 사용하는 식별자
spec:
  replicas: 1             # 실행할 파드(컨테이너) 개수 — 1개로 시작
  selector:
    matchLabels:
      app: netflux        # 이 라벨이 붙은 파드를 이 Deployment가 관리함
  template:
    metadata:
      labels:
        app: netflux      # 파드에 붙이는 라벨 (위의 selector와 일치해야 함)
    spec:
      # netflux-sa: DynamoDB 접근 권한(IRSA)이 연결된 서비스 계정
      # 이 서비스 계정을 통해 파드가 AWS 자격증명 없이도 DynamoDB에 접근 가능
      serviceAccountName: netflux-sa
      containers:
      - name: netflux
        # image 값은 CodeBuild가 빌드 후 자동으로 ECR 주소로 교체합니다
        # 예) 123456789012.dkr.ecr.us-east-1.amazonaws.com/netflux:a1b2c3d
        image: PLACEHOLDER/netflux:latest
        ports:
        - containerPort: 5000   # Flask 앱이 내부적으로 사용하는 포트 번호
        env:
        # 애플리케이션이 참조할 DynamoDB 테이블 이름
        - name: DYNAMODB_TABLE
          value: "Movies"
        # 애플리케이션이 사용할 AWS 리전
        - name: AWS_REGION
          value: "us-east-1"
