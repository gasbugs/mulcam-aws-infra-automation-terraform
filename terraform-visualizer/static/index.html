<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terraform Infrastructure Visualizer</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M1 3.5L8.5 8V17L1 12.5V3.5Z" fill="#7B42BC"/>
          <path d="M9.5 8L17 3.5V12.5L9.5 17V8Z" fill="#7B42BC"/>
          <path d="M9.5 18L17 13.5V22.5L9.5 27V18Z" fill="#7B42BC" opacity="0.6"/>
          <path d="M18 3.5L25.5 8V17L18 12.5V3.5Z" fill="#7B42BC" opacity="0.6"/>
        </svg>
        <h1>TF Visualizer</h1>
      </div>
      <div class="search-box">
        <input type="text" id="search" placeholder="Search projects..." />
      </div>
      <div class="upload-bar">
        <button id="btn-zip" class="btn-source" title="ZIP 파일 업로드">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <path d="M7 1v8M7 9L4 6m3 3 3-3M2 11h10"/>
            <rect x="1" y="10" width="12" height="3" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          ZIP 업로드
        </button>
        <button id="btn-github" class="btn-source" title="GitHub 저장소 URL">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub
        </button>
        <input type="file" id="zip-file-input" accept=".zip" style="display:none">
      </div>
    </div>
    <nav id="project-tree"></nav>
  </aside>

  <!-- Main content -->
  <main id="main">
    <header id="toolbar">
      <div id="project-info">
        <span id="project-name">Select a project</span>
        <span id="resource-count" class="badge"></span>
      </div>
      <div class="toolbar-actions">
        <button id="btn-details" class="btn-toggle" title="Show/hide plumbing resources">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <circle cx="7" cy="7" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 4v6M4 7h6" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span id="btn-details-label">상세 보기</span>
          <span id="btn-details-count" class="detail-count"></span>
        </button>
        <button id="btn-fit" title="Fit to screen">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M1 1h5v2H3v3H1V1zm9 0h5v5h-2V3h-3V1zM1 10h2v3h3v2H1v-5zm12 3h-3v2h5v-5h-2v3z"/>
          </svg>
        </button>
        <button id="btn-export" title="Export SVG">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1v8.5M8 9.5l-3-3M8 9.5l3-3M2 12v2h12v-2"/>
          </svg>
          Export SVG
        </button>
      </div>
    </header>

    <div id="canvas-container">
      <svg id="diagram"></svg>
      <div id="welcome" class="welcome-screen">
        <div class="welcome-content">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none">
            <path d="M1 3.5L8.5 8V17L1 12.5V3.5Z" fill="#7B42BC"/>
            <path d="M9.5 8L17 3.5V12.5L9.5 17V8Z" fill="#7B42BC"/>
            <path d="M9.5 18L17 13.5V22.5L9.5 27V18Z" fill="#7B42BC" opacity="0.5"/>
            <path d="M18 3.5L25.5 8V17L18 12.5V3.5Z" fill="#7B42BC" opacity="0.5"/>
          </svg>
          <h2>Terraform Infrastructure Visualizer</h2>
          <p>Select a project from the sidebar to visualize its AWS architecture</p>
        </div>
      </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip hidden"></div>

    <!-- Legend -->
    <div id="legend" class="legend hidden">
      <h4>Categories</h4>
      <div id="legend-items"></div>
    </div>

    <!-- Code Panel (slides up from bottom on node click) -->
    <div id="code-panel" class="code-panel hidden">
      <div class="code-panel-header">
        <div class="code-panel-info">
          <span id="code-panel-title" class="code-panel-title"></span>
          <span id="code-panel-file" class="code-panel-file"></span>
        </div>
        <button id="code-panel-close" class="code-panel-close" title="Close (or click node again)">✕</button>
      </div>
      <pre id="code-panel-content" class="code-panel-content"></pre>
    </div>
  </main>

  <!-- GitHub URL modal -->
  <div id="github-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>GitHub 저장소 가져오기</span>
        <button id="github-modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">공개 저장소 URL 또는 <code>user/repo</code> 형식</p>
        <input type="text" id="github-url-input" class="modal-input"
               placeholder="https://github.com/user/repo">
        <div id="github-error" class="modal-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button id="github-modal-cancel" class="btn-modal-cancel">취소</button>
        <button id="github-modal-load" class="btn-modal-load">가져오기</button>
      </div>
    </div>
  </div>

  <script src="/js/icons.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/diagram.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
